name: 보도자료 자동 업데이트

on:
  schedule:
    # 매일 UTC 00:00 = 한국시간(KST) 오전 9시
    - cron: "0 0 * * *"
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 버튼도 제공

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 보도자료 수집 및 페이지 생성
        run: python generate_press_releases.py

      - name: 결과물을 index.html로 복사 (GitHub Pages용)
        run: cp press_releases.html index.html

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add press_releases.html index.html
          git diff --quiet --cached || git commit -m "chore: 보도자료 자동 업데이트 $(date +'%Y-%m-%d %H:%M')"
          git push

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
